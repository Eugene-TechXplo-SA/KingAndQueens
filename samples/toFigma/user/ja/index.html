<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING & QUEEN User App - All Screens (JA)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* =============================================
   KING & QUEEN User App - Shared CSS
   Synced from samples/user/index.html
   + Figma export layout additions
   ============================================= */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#E53935;
  --brand-dark:#B71C1C;
  --brand-soft:#FFF1F0;
  --bg:#F7F4F1;
  --bg-strong:#E8E1DA;
  --white:#FFF;
  --surface:#FFF;
  --surface-muted:#FCFAF8;
  --surface-alt:#F4EFE9;
  --border:#E8E1DB;
  --border-strong:#D9CEC5;
  --text-primary:#191513;
  --text-secondary:#6A615B;
  --text-muted:#A1958D;
  --green:#22C55E;
  --red:#EF4444;
  --font:'Noto Sans JP',sans-serif;
  --radius-xs:10px;
  --radius-sm:16px;
  --radius-md:22px;
  --radius-lg:28px;
  --radius-pill:9999px;
  --shadow-soft:0 16px 36px rgba(25,21,19,.08);
  --shadow-card:0 10px 28px rgba(25,21,19,.06);
}
body{
  font-family:var(--font);background:linear-gradient(180deg,#ECE7E1 0%,#E3DDD6 100%);
  display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:24px 0;
}

.phone-frame{
  width:375px;min-height:812px;background:linear-gradient(180deg,#F7F4F1 0%,#FFFFFF 26%,#FBFAF8 100%);
  border-radius:40px;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.18),0 0 0 12px #181818;
  position:relative;display:flex;flex-direction:column;
}
.status-bar{
  height:44px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);display:flex;align-items:center;
  justify-content:center;padding:0 24px;font-size:12px;font-weight:700;color:var(--text-primary);
}
.status-bar .time{font-weight:900}
.status-bar .icons{margin-left:auto;display:flex;gap:6px;font-size:11px}

/* Header */
.app-header{
  min-height:64px;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);display:flex;
  align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(217,206,197,.72);
}
.logo-area{display:flex;align-items:center;gap:8px;width:auto}
.logo-area i{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--brand-soft);color:var(--brand);font-size:16px;
}
.logo-area span{font-size:17px;font-weight:900;color:var(--text-primary);letter-spacing:.02em}
.logo-area span b{color:var(--brand)}
.header-right{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.wallet-pill{
  display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface);
  border-radius:var(--radius-pill);padding:8px 12px;cursor:pointer;min-width:130px;box-shadow:var(--shadow-card);
}
.wallet-dot{width:8px;height:8px;border-radius:50%}
.wallet-dot.on{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.55)}
.wallet-dot.off{background:#D1D5DB}
.wallet-pill-top{font-size:9px;font-weight:900;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase}
.wallet-pill-text{font-size:12px;font-weight:900;color:var(--text-primary);margin-top:1px}
.wallet-cta{
  margin-left:6px;background:var(--brand);border-radius:var(--radius-pill);padding:4px 8px;color:#fff;
  font-weight:900;font-size:10px;
}
.notif-btn{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
  position:relative;background:var(--brand-soft);border:1px solid rgba(229,57,53,.14);box-shadow:var(--shadow-card);
}
.notif-btn i{font-size:16px;color:var(--brand)}
.bell-badge{
  position:absolute;top:-5px;right:-3px;min-width:18px;height:18px;border-radius:var(--radius-pill);
  background:var(--text-primary);display:flex;align-items:center;justify-content:center;padding:0 4px;
  color:#fff;font-weight:900;font-size:10px;
}

/* Main content */
.main-content{
  flex:1;overflow-y:auto;overflow-x:hidden;background:linear-gradient(180deg,#F7F4F1 0%,#FFFFFF 180px);
}
.page{padding:18px;display:flex;flex-direction:column;gap:18px;padding-bottom:40px}
.page.hidden{display:none}

/* Cards */
.card{
  background:rgba(255,255,255,.96);border-radius:var(--radius-md);padding:20px;border:1px solid var(--border);
  box-shadow:var(--shadow-card);
}
.card-subtitle{
  font-size:11px;font-weight:900;color:var(--brand);padding-left:0;margin-bottom:14px;letter-spacing:.08em;
  text-transform:uppercase;display:flex;align-items:center;gap:8px;
}
.card-subtitle::before{content:'';width:28px;height:3px;border-radius:var(--radius-pill);background:var(--brand)}

/* Buttons */
.btn-primary{
  background:var(--brand);color:#fff;font-weight:900;font-size:14px;padding:14px 18px;border-radius:var(--radius-pill);
  border:none;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;width:100%;
  box-shadow:0 12px 24px rgba(229,57,53,.24);line-height:1;
}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{
  background:var(--white);color:var(--text-primary);font-weight:900;font-size:14px;padding:14px 18px;
  border-radius:var(--radius-pill);border:1px solid var(--border-strong);display:flex;align-items:center;
  justify-content:center;gap:8px;cursor:pointer;width:100%;box-shadow:0 8px 18px rgba(25,21,19,.05);line-height:1;
}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn-row>*{flex:1}

/* Bottom Nav */
.bottom-nav{
  height:72px;background:rgba(255,255,255,.94);border-top:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-around;padding:6px 12px 12px;flex-shrink:0;backdrop-filter:blur(16px);gap:8px;
}
.tab-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  padding:10px 12px;border-radius:18px;-webkit-tap-highlight-color:transparent;flex:1;
}
.tab-item i{font-size:20px;color:var(--text-muted)}
.tab-item.active{background:var(--brand-soft)}
.tab-item.active i{color:var(--brand)}
.tab-item span{font-size:11px;font-weight:700;color:var(--text-muted)}
.tab-item.active span{color:var(--brand)}

/* Menu list */
.menu-list{display:flex;flex-direction:column}
.menu-list-item{
  display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid rgba(232,225,219,.88);
  cursor:pointer;transition:background .15s;
}
.menu-list-item:last-child{border-bottom:none}
.menu-list-item:active{background:var(--surface-alt)}
.menu-list-item.on{background:var(--brand-soft)}
.menu-list-item.on>i:first-child{color:var(--brand)}
.menu-list-item>i:first-child{font-size:16px;color:var(--text-secondary);width:20px;text-align:center}
.menu-list-item>span{flex:1;font-size:14px;font-weight:700;color:var(--text-primary)}
.menu-arrow{font-size:12px;color:var(--text-muted)}

/* Form elements */
.text-field{
  width:100%;border:1px solid var(--border);border-radius:18px;padding:14px 16px;font-size:14px;
  font-family:var(--font);background:var(--surface-muted);color:#4B5563;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.65);
}
.text-field:focus{border-color:var(--brand);background:#FFF}
.apply-label{font-size:12px;font-weight:800;color:var(--text-secondary);margin-bottom:6px;margin-top:8px}
.mini-hint{margin-top:10px;font-size:12px;color:var(--text-secondary);line-height:18px}

/* Status pills */
.status-pill{
  display:inline-flex;align-items:center;padding:5px 10px;border-radius:var(--radius-pill);font-size:10px;
  font-weight:900;border:1px solid;line-height:1;
}
.status-ok{border-color:#BBF7D0;background:#DCFCE7;color:#166534}
.status-warn{border-color:#FDE68A;background:#FEF3C7;color:#92400E}
.status-err{border-color:#FECACA;background:#FEE2E2;color:#991B1B}
.status-info{border-color:#DBEAFE;background:#EFF6FF;color:#1E40AF}
.status-neutral{border-color:#E5E7EB;background:#F3F4F6;color:#6B7280}

/* KV rows */
.kv-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1EBE5}
.kv-key{font-size:13px;font-weight:700;color:var(--text-secondary)}
.kv-value{font-size:13px;font-weight:900;color:var(--text-primary)}

/* Choice chips */
.choice-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.choice-chip{
  padding:9px 15px;border:1px solid var(--border);border-radius:var(--radius-pill);font-size:13px;
  font-weight:800;color:#4B443F;cursor:pointer;background:var(--surface-muted);
}
.choice-chip.on{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 10px 18px rgba(229,57,53,.18)}

/* Asset row */
.asset-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.asset-icon{
  width:32px;height:32px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;
  overflow:hidden;background:var(--surface-alt);
}
.asset-name{font-weight:900;color:var(--text-primary);font-size:14px}
.asset-jpy{font-size:11px;color:var(--text-muted);font-weight:700}
.asset-balance{font-weight:900;color:var(--text-primary);font-size:16px;margin-left:auto}

/* Weekly chart */
.weekly-kpi-row{display:flex;gap:12px;margin-bottom:10px}
.weekly-kpi{flex:1;border:1px solid var(--border);background:var(--surface-muted);border-radius:var(--radius-sm);padding:12px}
.weekly-kpi-label{color:var(--text-muted);font-weight:900;font-size:11px}
.weekly-kpi-value{margin-top:6px;font-weight:900;color:var(--text-primary);font-size:16px}
.weekly-kpi-unit{color:var(--text-muted);font-weight:900;font-size:11px}
.weekly-chart{display:flex;justify-content:space-between;align-items:flex-end;padding-top:6px}
.weekly-bar-col{display:flex;flex-direction:column;align-items:center;width:34px}
.weekly-bar-track{
  width:10px;height:60px;border-radius:var(--radius-pill);background:#F1EBE5;display:flex;flex-direction:column;
  justify-content:flex-end;overflow:hidden;
}
.weekly-bar-fill{width:100%;background:rgba(198,40,40,.28);border-radius:0}
.weekly-bar-label{margin-top:6px;color:var(--text-muted);font-weight:900;font-size:10px}

/* Rank */
.tier-line{display:flex;align-items:center;justify-content:center;gap:0}
.tier-connector{height:2px;flex:1;background:#E5E7EB;margin:0 4px}
.tier-connector.reached{background:var(--brand)}
.tier-node-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.tier-node{
  width:44px;height:44px;border-radius:50%;border:1.5px solid #D1D5DB;display:flex;
  align-items:center;justify-content:center;cursor:pointer;background:var(--white);
  box-shadow:0 6px 16px rgba(25,21,19,.05);
}
.tier-node.active{border-width:2.5px; transform: scale(1.14);}
.tier-node-label{font-size:11px;font-weight:700;color:var(--text-muted)}
.rank-card{
  border:1px solid;border-radius:24px;padding:18px;margin-top:12px;background: var(--white);
  position:relative;overflow:hidden;box-shadow:var(--shadow-soft);
}
.rank-card-header{display:flex;align-items:center;gap:12px}
.rank-shield{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;position:relative;z-index:1;}
.rank-card-name{font-weight:900;font-size:18px}
.rank-card-sub{font-size:12px;color:var(--text-secondary);font-weight:700;margin-top:2px}
.rank-progress-track{height:10px;background:#EFE7E0;border-radius:var(--radius-pill);overflow:hidden;margin-top:12px}
.rank-progress-fill{height:100%;border-radius:var(--radius-pill)}
.rank-progress-labels{display:flex;justify-content:space-between;margin-top:4px}
.rank-progress-label-text{font-size:11px;font-weight:900;color:var(--text-muted)}
.rank-benefit-row{display:flex;gap:10px;margin-top:12px}
.rank-benefit-card{flex:1;border-radius:18px;padding:12px;text-align:center}
.rank-benefit-card i{font-size:14px;margin-bottom:6px}
.rank-benefit-label{font-size:11px;font-weight:700;color:var(--text-secondary);margin-top:4px}
.rank-benefit-value{font-weight:900;font-size:14px;margin-top:4px}
.rank-max-badge{display:inline-flex;align-items:center;gap:6px;margin-top:4px}
.rank-max-badge span{font-weight:900;font-size:12px;color:var(--brand)}

/* Donut chart */
.donut-section{display:flex;align-items:center;gap:20px;margin-top:8px}
.donut-wrap{position:relative;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-top-label{color:var(--text-muted);font-weight:900;font-size:10px}
.donut-value{color:var(--text-primary);font-weight:900;font-size:22px;margin-top:2px}
.donut-unit{color:var(--text-muted);font-weight:900;font-size:11px;margin-top:2px}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.donut-legend-row{display:flex;align-items:center;gap:8px}
.donut-legend-dot{width:10px;height:10px;border-radius:50%}
.donut-legend-label{font-size:12px;font-weight:700;color:var(--text-secondary);width:40px}
.donut-legend-val{font-size:12px;font-weight:900;color:var(--text-primary)}

/* Bar chart */
.bar-chart-scroll{display:flex;gap:14px;padding:12px 4px;overflow-x:auto}
.bar-chart-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:44px}
.bar-chart-track{
  width:32px;height:120px;background:var(--surface-alt);border-radius:16px;display:flex;flex-direction:column;
  justify-content:flex-end;overflow:hidden;padding:4px;
}
.bar-chart-fill{width:100%;border-radius:12px 12px 10px 10px}
.donut-svg svg{transform-origin:center center}
.bar-chart-fill{transform-origin:bottom center}
.bar-chart-amount{font-size:10px;font-weight:900;color:var(--text-primary);text-align:center}
.bar-chart-label{font-size:11px;font-weight:700;color:var(--text-muted)}

/* Onboarding / Account cards */
.account-carousel{display:flex;gap:14px;overflow-x:auto;padding:8px 2px}
.account-card{
  width:220px;min-height:160px;border:1px solid var(--border);background:linear-gradient(180deg,#FFF 0%,#FBF7F3 100%);
  border-radius:24px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0;cursor:pointer;
  box-shadow:var(--shadow-card);
}
.account-card-add{border-style:dashed;border-color:var(--border-strong);background:#fff;justify-content:center}
.account-card-top{display:flex;align-items:center;gap:10px}
.account-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.account-icon-text{font-weight:900;font-size:14px}
.account-broker-name{font-weight:900;color:#374151;font-size:16px}
.account-card-bottom{margin-top:auto;padding-top:16px}
.account-no-row{display:flex;align-items:center;gap:6px}
.account-no-text{color:var(--text-muted);font-weight:700;font-size:13px}
.account-label{font-weight:900;color:var(--text-primary);font-size:18px;margin-top:4px}
.account-add-inner{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.account-add-circle{
  width:48px;height:48px;border-radius:16px;border:1.5px solid #D1D5DB;display:flex;align-items:center;justify-content:center;
}
.account-add-title{font-weight:900;color:#374151;font-size:18px}
.account-add-desc{color:var(--text-muted);font-weight:700;font-size:12px;line-height:18px}

/* Broker picker */
.picker-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #F3F4F6}
.picker-icon{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.picker-icon-text{font-weight:900;font-size:12px}
.picker-name{flex:1;font-weight:900;color:var(--text-primary)}
.picker-go{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted)}
.search-field{
  width:100%;border:1px solid var(--border);border-radius:18px;padding:12px 14px;font-size:14px;
  font-family:var(--font);background:var(--surface-muted);color:#4B5563;outline:none;margin-top:8px;
}
.search-field:focus{border-color:var(--brand);background:#FFF}

/* Stepper */
.stepper{display:flex;flex-direction:column;gap:0}
.step-row{display:flex;gap:0}
.step-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.step-circle{
  width:28px;height:28px;border-radius:50%;border:2px solid #D1D5DB;display:flex;
  align-items:center;justify-content:center;background:#F3F4F6;font-size:12px;font-weight:900;color:var(--text-muted);
}
.step-circle.done{background:var(--brand);border-color:var(--brand);color:#fff}
.step-circle.active{border-color:var(--brand);background:#FEF2F2;color:var(--brand)}
.step-line{width:2px;flex:1;min-height:40px;background:#E5E7EB;margin:4px 0}
.step-body{flex:1;padding:0 0 24px 12px}
.step-title{font-weight:700;color:var(--text-primary);font-size:14px}
.step-title.active{font-weight:900;color:var(--brand)}
.step-desc{font-size:12px;color:var(--text-secondary);margin-top:4px;line-height:18px}

/* Info box */
.info-box{display:flex;gap:12px;padding:14px;border:1px solid #BFDBFE;background:#EFF6FF;border-radius:18px}
.info-box.brand{border-color:rgba(198,40,40,.2);background:#FEF2F2}
.info-title{font-weight:900;color:var(--text-primary);font-size:13px}
.info-text{font-size:12px;color:var(--text-secondary);line-height:18px;margin-top:4px}

/* Notice */
.notice-subtle{
  display:flex;align-items:flex-start;gap:10px;padding:14px;border:1px solid var(--border);
  background:var(--surface-muted);border-radius:18px;margin-top:8px;
}
.notice-subtle-text{font-size:12px;color:var(--text-secondary);font-weight:700;line-height:18px}

/* Application items */
.app-item{
  display:flex;align-items:center;gap:10px;padding:14px;border:1px solid var(--border);border-radius:18px;background:var(--white);
}
.app-title{font-weight:900;color:var(--text-primary);font-size:14px}
.app-sub{font-size:12px;color:var(--text-muted);font-weight:700}

/* Announcements */
.announcement-item{
  padding:16px;border:1px solid var(--border);border-radius:22px;cursor:pointer;background:var(--white);box-shadow:var(--shadow-card);
}
.announcement-item.high{border-color:#FECACA;background:#FEF2F2}
.announcement-header{display:flex;align-items:flex-start;gap:10px}
.announcement-tags{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.unread-badge{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;
  background:var(--brand);color:#fff;font-size:10px;font-weight:900;
}
.announcement-title{font-weight:700;color:var(--text-primary);font-size:14px;margin-top:2px}
.announcement-date{font-size:11px;color:var(--text-muted);font-weight:700;margin-top:4px}
.announcement-body{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.announcement-body-text{font-size:13px;color:var(--text-secondary);line-height:20px}

/* Payout request card */
.payout-card{
  padding:16px;border:1px solid var(--border);border-radius:20px;border-left:4px solid var(--brand);
  background:var(--white);box-shadow:var(--shadow-card);
}

/* Checkbox */
.check-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.checkbox{
  width:24px;height:24px;border:1.5px solid #D1D5DB;border-radius:8px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;background:var(--surface-muted);
}
.checkbox.on{background:var(--brand);border-color:var(--brand);color:#fff}

/* Auth screen */
.auth-screen{
  flex:1;background:linear-gradient(180deg,#F6F1EC 0%,#FFF 44%,#FBFAF8 100%);display:flex;flex-direction:column;
  justify-content:center;padding:24px;
}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo i{
  width:72px;height:72px;border-radius:24px;display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;color:var(--brand);background:var(--brand-soft);box-shadow:var(--shadow-card);
}
.auth-logo h1{font-size:28px;font-weight:900;color:var(--text-primary);margin-top:16px;letter-spacing:.03em}
.auth-logo h1 b{color:var(--brand)}
.auth-logo p{color:var(--text-secondary);font-weight:700;margin-top:4px;font-size:14px}
.auth-tabs{display:flex;margin-bottom:16px;background:var(--surface-alt);border-radius:var(--radius-pill);padding:4px}
.auth-tab{
  flex:1;padding:11px 10px;text-align:center;font-weight:800;font-size:14px;color:var(--text-muted);
  border-bottom:none;border-radius:var(--radius-pill);cursor:pointer;
}
.auth-tab.active{color:var(--brand);background:var(--white);box-shadow:0 6px 12px rgba(25,21,19,.06)}
.auth-link{text-align:center;margin-top:12px;color:var(--brand);font-weight:700;font-size:13px;cursor:pointer}
.error-text{color:#EF4444;font-size:11px;font-weight:700;margin-top:4px}

/* Settings section nav */
.settings-nav{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.settings-chip{
  display:flex;align-items:center;gap:6px;padding:9px 15px;border:1px solid var(--border);
  border-radius:var(--radius-pill);font-size:12px;font-weight:800;color:#374151;cursor:pointer;
  background:var(--surface-muted);white-space:nowrap;flex-shrink:0;
}
.settings-chip.on{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 10px 18px rgba(229,57,53,.18)}
.settings-chip.on i{color:#fff}

/* Warning banner */
.warning-banner{
  display:flex;gap:12px;padding:14px;border:1px solid #FDE68A;background:#FEF3C7;border-radius:18px;
  align-items:flex-start;margin-bottom:12px;
}
.warning-banner.danger{border-color:#FECACA;background:#FEF2F2}
.warning-title{font-weight:900;color:#92400E;font-size:13px}
.warning-text{font-size:12px;color:#92400E;line-height:18px;margin-top:2px}

/* KYC */
.kyc-status-icon{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.kyc-icon-circle{width:64px;height:64px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px}
.kyc-stepper{display:flex;align-items:center;margin:16px 0}
.kyc-step{display:flex;flex-direction:column;align-items:center;flex:1}
.kyc-step-circle{
  width:28px;height:28px;border-radius:50%;border:2px solid #D1D5DB;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:900;background:#F3F4F6;color:var(--text-muted);
}
.kyc-step-circle.done{background:#16A34A;border-color:#16A34A;color:#fff}
.kyc-step-circle.active{background:#FEF3C7;border-color:#F59E0B;color:#F59E0B}
.kyc-step-circle.fail{background:#FEE2E2;border-color:#EF4444;color:#EF4444}
.kyc-step-label{font-size:10px;font-weight:900;margin-top:4px}
.kyc-connector{height:2px;flex:.6;background:#E5E7EB;margin-bottom:18px}
.kyc-connector.done{background:#16A34A}

/* Upload area */
.upload-area{
  border:1px dashed #D1D5DB;border-radius:20px;padding:24px;display:flex;flex-direction:column;
  align-items:center;gap:8px;cursor:pointer;margin-top:12px;background:var(--surface-muted);
}
.upload-area i{font-size:20px;color:var(--text-muted)}
.upload-area span{font-size:13px;color:var(--text-muted);font-weight:700}

/* History */
.history-item{
  display:flex;align-items:center;padding:14px;border:1px solid var(--border);border-radius:20px;gap:10px;background:var(--white);
}
.history-tag{display:inline-flex;padding:4px 8px;border-radius:var(--radius-pill);font-size:10px;font-weight:900}
.history-tag.in{background:#DCFCE7;color:#166534}
.history-tag.out{background:#FEE2E2;color:#991B1B}

/* Page-specific: next reward */
.next-reward{display:flex;align-items:center;gap:10px;margin-top:4px}
.next-reward i{color:var(--brand);font-size:18px}
.next-reward span{font-weight:900;color:var(--text-primary);font-size:16px}

/* Payout stepper */
.payout-stepper{display:flex;align-items:center;margin:8px 0}
.payout-step{display:flex;flex-direction:column;align-items:center;flex:1}
.payout-step-circle{
  width:28px;height:28px;border-radius:50%;border:2px solid #D1D5DB;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:900;background:#F3F4F6;color:var(--text-muted);
}
.payout-step-circle.done{background:#16A34A;border-color:#16A34A;color:#fff}
.payout-step-circle.active{background:#FEF3C7;border-color:#F59E0B;color:#F59E0B}
.payout-step-circle.fail{background:#FEE2E2;border-color:#EF4444;color:#EF4444}
.payout-step-label.fail{color:#EF4444}
.payout-step-label{font-size:10px;font-weight:900;margin-top:4px;color:var(--text-muted)}
.payout-step-label.done{color:#16A34A}
.payout-step-label.active{color:#F59E0B}
.payout-connector{height:2px;flex:.6;background:#E5E7EB;margin-bottom:18px}
.payout-connector.done{background:#16A34A}

/* SVG donut placeholder */
.donut-svg{position:relative;width:148px;height:148px;flex-shrink:0}

// ---------- KYC State HTML generators ----------
function getKycHtml(state) {
  const stepper = (s1, s2, s3) => `
    <div class="kyc-stepper">
      <div class="kyc-step"><div class="kyc-step-circle ${s1.cls}">${s1.icon}</div><div class="kyc-step-label" style="color:${s1.color}">書類提出</div></div>
      <div class="kyc-connector ${s1.cls === 'done' ? 'done' : ''}"></div>
      <div class="kyc-step"><div class="kyc-step-circle ${s2.cls}">${s2.icon}</div><div class="kyc-step-label" style="color:${s2.color}">審査中</div></div>
      <div class="kyc-connector ${s2.cls === 'done' ? 'done' : ''}"></div>
      <div class="kyc-step"><div class="kyc-step-circle ${s3.cls}">${s3.icon}</div><div class="kyc-step-label" style="color:${s3.color}">完了</div></div>
    </div>`;
  const chk = {cls:'done', icon:'<i class="fas fa-check" style="font-size:11px"></i>', color:'#16A34A'};
  const act = {cls:'active', icon:'<i class="fas fa-spinner" style="font-size:11px"></i>', color:'#F59E0B'};
  const off = {cls:'', icon:'—', color:'var(--text-muted)'};
  const fail = {cls:'fail', icon:'<i class="fas fa-times" style="font-size:11px"></i>', color:'#EF4444'};

  if (state === 'none') {
    return `
      <div class="kyc-status-icon"><div class="kyc-icon-circle" style="background:#F3F4F6"><i class="fas fa-id-card" style="color:#9CA3AF;font-size:28px"></i></div><div style="font-weight:900;color:var(--text-primary);font-size:16px;margin-top:16px;text-align:center">本人確認が未完了です</div><div style="color:var(--text-secondary);font-weight:700;margin-top:8px;text-align:center;line-height:20px">出金するにはKYC認証が必要です。</div></div>
      ${stepper(off, off, off)}
      <div class="card" style="margin-top:12px;border:1px dashed #D1D5DB"><div class="card-subtitle">書類を提出する</div><div class="apply-label" style="margin-top:8px">書類種別</div><div class="choice-row"><div class="choice-chip on">運転免許証</div><div class="choice-chip">パスポート</div><div class="choice-chip">マイナンバー</div></div><div style="margin-top:12px;padding:24px;border:2px dashed #D1D5DB;border-radius:2px;text-align:center"><i class="fas fa-cloud-upload-alt" style="font-size:24px;color:#9CA3AF"></i><div style="font-weight:700;color:var(--text-muted);font-size:12px;margin-top:8px">書類をアップロード</div><div style="font-weight:700;color:var(--text-muted);font-size:10px;margin-top:4px">JPG / PNG / PDF（最大5MB）</div></div><button class="btn-primary" style="margin-top:12px"><i class="fas fa-paper-plane"></i><span>提出する</span></button></div>`;
  } else if (state === 'pending') {
    return `
      <div class="kyc-status-icon"><div class="kyc-icon-circle" style="background:#FEF3C7"><i class="fas fa-clock" style="color:#F59E0B;font-size:28px"></i></div><div style="font-weight:900;color:var(--text-primary);font-size:16px;margin-top:16px;text-align:center">審査中です</div><div style="color:var(--text-secondary);font-weight:700;margin-top:8px;text-align:center;line-height:20px">書類を確認しています。しばらくお待ちください。</div></div>
      ${stepper(chk, act, off)}
      <div style="margin-top:12px"><div class="kv-row"><span class="kv-key">提出日</span><span class="kv-value">2026/02/18</span></div><div class="kv-row"><span class="kv-key">書類種別</span><span class="kv-value">運転免許証</span></div></div>`;
  } else if (state === 'approved') {
    return `
      <div class="kyc-status-icon"><div class="kyc-icon-circle" style="background:#DCFCE7"><i class="fas fa-check-circle" style="color:#16A34A;font-size:28px"></i></div><div style="font-weight:900;color:var(--text-primary);font-size:16px;margin-top:16px;text-align:center">本人確認が完了しました</div><div style="color:var(--text-secondary);font-weight:700;margin-top:8px;text-align:center;line-height:20px">KYCが承認されました。全ての機能をご利用いただけます。</div></div>
      ${stepper(chk, chk, chk)}
      <div style="margin-top:12px"><div class="kv-row"><span class="kv-key">認証日</span><span class="kv-value">2026/02/20</span></div><div class="kv-row"><span class="kv-key">書類種別</span><span class="kv-value">運転免許証</span></div></div>`;
  } else if (state === 'rejected') {
    return `

// ---------- Rank Variants for Dashboard ----------
function applyRankToDashboard(root, rank) {
  const configs = {

      accent: 'rgba(156,163,175,0.65)', accentSoft: 'rgba(156,163,175,0.22)',

    gold: {
      name: 'Gold', icon: 'fa-crown', color: '#D97706', bg: '#FFFBEB',
      accent: 'rgba(217,119,6,0.65)', accentSoft: 'rgba(217,119,6,0.22)',
      badgeBg: '#D97706', badgeText: '#fff',
      pts: 73500, next: null, nextPts: 50000, basePts: 50000,
      rate: 'x1.50', fee: '手数料 -50%'
    }
  };
  const c = configs[rank];
  if (!c) return;

  const tiers = ['bronze', 'silver', 'gold'];
  const tierIdx = tiers.indexOf(rank);
  const tierConfigs = {
    bronze: { color: '#92400E', bg: '#FEF3C7', icon: 'fa-shield-alt' },
    silver: { color: '#9CA3AF', bg: '#F3F4F6', icon: 'fa-gem' },
    gold: { color: '#D97706', bg: '#FFFBEB', icon: 'fa-crown' }
  };

  // Update tier nodes
  root.querySelectorAll('.tier-node-col').forEach((col, i) => {
    const node = col.querySelector('.tier-node');
    const label = col.querySelector('.tier-node-label');
    const icon = node.querySelector('i');
    const isReached = i <= tierIdx;
    const isActive = i === tierIdx;
    const tc = tierConfigs[tiers[i]];
    node.className = 'tier-node' + (isActive ? ' active' : '');
    node.style.borderColor = isActive ? tc.color : (isReached ? tc.color : '#D1D5DB');
    node.style.background = isActive ? tc.bg : 'var(--white)';
    icon.style.color = isReached ? tc.color : '#D1D5DB';
    label.style.color = isReached ? tc.color : 'var(--text-muted)';
    label.style.fontWeight = isActive ? '900' : '700';
  });

  // Update connectors
  root.querySelectorAll('.tier-connector').forEach((conn, i) => {
    conn.style.background = (i < tierIdx) ? tierConfigs[tiers[i + 1]].color : '#E5E7EB';
  });

  // Update rank card
  const card = root.querySelector('.rank-card');
  const badgeBg = c.badgeBg || c.color;
  const badgeText = c.badgeText || '#fff';
  const progress = c.next ? Math.round(((c.pts - c.basePts) / (c.nextPts - c.basePts)) * 100) : 100;
  const remain = c.next ? (c.nextPts - c.pts) : 0;

  card.style.borderColor = c.accent;
  card.querySelector('.rank-shield').style.background = badgeBg;
  card.querySelector('.rank-shield i').className = 'fas ' + c.icon;
  card.querySelector('.rank-shield i').style.color = badgeText;
  card.querySelector('.rank-card-name').style.color = c.color;
  card.querySelector('.rank-card-name').textContent = c.name;
  card.querySelector('.rank-card-sub').innerHTML = c.next
    ? `Next: ${c.next} まであと ${remain.toLocaleString()} pt`
    : '<span class="rank-max-badge"><i class="fas fa-star" style="color:var(--brand);font-size:10px"></i> <span>MAX RANK</span></span>';
  card.querySelector('.rank-progress-fill').style.width = progress + '%';
  card.querySelector('.rank-progress-fill').style.background = badgeBg;
  card.querySelectorAll('.rank-progress-label-text')[0].textContent = c.pts.toLocaleString() + ' pt';
  card.querySelectorAll('.rank-progress-label-text')[1].textContent = progress + '%';
  card.querySelectorAll('.rank-benefit-card')[0].style.background = c.accentSoft;
  card.querySelectorAll('.rank-benefit-card')[0].querySelector('i').style.color = badgeBg;
  card.querySelectorAll('.rank-benefit-card')[0].querySelector('.rank-benefit-value').style.color = c.color;

// ---------- Frame Creation ----------
function createFrame(config, lang) {
  const wrapper = document.createElement('div');
  wrapper.className = 'figma-screen-wrapper';

  // Label
  const label = document.createElement('div');
  label.className = 'figma-label';
  label.textContent = lang === 'en' ? config.labelEn : config.labelJa;
  wrapper.appendChild(label);

  // Phone frame
  const phone = document.createElement('div');
  phone.className = 'phone-frame';
  phone.innerHTML = PHONE_TEMPLATE;
  wrapper.appendChild(phone);

  // Setup based on type
  if (config.type === 'auth') {
    // Show the target auth screen
    const target = phone.querySelector(`[data-screen="${config.screen}"]`);
    if (target) target.style.display = 'flex';
    // Hide header, main, nav
    // (they default to display:none via style attribute)
    // Run setup function if any
    if (config.setup) config.setup(phone);
  } else if (config.type === 'app') {
    // Show header, main, nav
    phone.querySelector('[data-part="header"]').style.display = 'flex';
    phone.querySelector('[data-part="main"]').style.display = 'block';
    phone.querySelector('[data-part="nav"]').style.display = 'flex';

    // Show only target page
    phone.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    const targetPage = phone.querySelector(`[data-page="${config.page}"]`);
    if (targetPage) targetPage.classList.remove('hidden');

    // Set active tab
    phone.querySelectorAll('.tab-item').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === config.tab);
    });

    // Rank variant (dashboard)
    if (config.rank) {
      applyRankToDashboard(phone, config.rank);
    }

    // Menu rank variant
    if (config.menuRankState) {
      applyRankToMenuRank(phone, config.menuRankState);
    }

    // KYC state
    if (config.kycState) {
      const kycBody = phone.querySelector('.kyc-body');
      if (kycBody) kycBody.innerHTML = getKycHtml(config.kycState);
    }

    // Payout mode
    if (config.payoutMode === 'form') {
      // Default: form visible, history hidden (already set in template)
    } else if (config.payoutMode === 'history') {
      const formSection = phone.querySelector('.payout-form-section');
      const histSection = phone.querySelector('.payout-history-section');
      if (formSection) formSection.style.display = 'none';
      if (histSection) histSection.style.display = 'block';

      // Show only the target payout state card
      const states = ['completed','pending','approved','processing','rejected','failed','cancelled'];
      const chipLabels = ['完了','申請中','承認済み','処理中','却下','失敗','キャンセル'];
      phone.querySelectorAll('.payout-state-item').forEach(card => {
        card.style.display = card.dataset.payoutState === config.payoutState ? 'block' : 'none';
      });
      // Update chips
      const chips = phone.querySelectorAll('.payout-state-chips .choice-chip');
      chips.forEach((chip, i) => {
        chip.classList.toggle('on', states[i] === config.payoutState);
      });
    }
  }

  return wrapper;
}


// ---------- Translation ----------
function applyTranslations(root) {
  if (typeof TRANSLATIONS === 'undefined') return;

  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  textNodes.forEach(node => {
    let text = node.textContent;
    for (const [ja, en] of Object.entries(TRANSLATIONS)) {
      if (text.includes(ja)) {
        text = text.replace(new RegExp(ja.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), en);
      }
    }
    node.textContent = text;
  });

  // Also translate placeholder attributes
  root.querySelectorAll('[placeholder]').forEach(el => {
    const ph = el.getAttribute('placeholder');
    if (TRANSLATIONS[ph]) el.setAttribute('placeholder', TRANSLATIONS[ph]);
  });
}


// ---------- Main Render Function ----------
function renderAllFrames(lang) {
  SCREEN_CONFIGS.forEach(config => {
    const frame = createFrame(config, lang);
    if (lang === 'en') applyTranslations(frame);
    document.body.appendChild(frame);
  });
}
